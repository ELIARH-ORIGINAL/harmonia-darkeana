<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.R.H.D - Harmonia Darkeana</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('sua-imagem-aqui.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            font-size: 14px;
        }

        .aviso { color: red; font-weight: bold; }

        /* Título Centralizado */
        .main-title {
            text-align: center;
            margin-top: 50px;
            color: #ff0000; /* Vermelho solicitado */
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
        }

        /* Caixa da API / Avatar */
        .api-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 300px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .avatar-display {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: white;
        }

        .btn-audio {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Rodapé */
        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #00ff41; /* Verde neon */
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div>E.R.H.D</div>
        <div class="aviso">SITE EM CONSTRUÇÃO</div>
    </header>

    <h1 class="main-title">Harmonia Darkeana</h1>

    <div class="api-container">
        <div class="avatar-display" id="avatar">
            <span>[Avatar Interativo]</span>
        </div>
        <input type="text" id="userInput" placeholder="Fale com a entidade...">
        <button class="btn-audio" onclick="startAudio()">🎤 Iniciar Áudio</button>
    </div>

    <footer>ENTIDADE RELIGIOSA HARMONIA DARKENA</footer>

    <script>
        // Função simples para testar o áudio
        function startAudio() {
            alert("Iniciando captura de áudio... (Conectando à API)");
            // Aqui entra a lógica da sua API de áudio e Firebase
        }
    </script>
</body>
</html>
