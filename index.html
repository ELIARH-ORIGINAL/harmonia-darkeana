<!-- CHAT -->
<div id="chat-box">
  <div id="messages"></div>
  <input id="input" placeholder="Digite...">
  <button onclick="send()">Enviar</button>
  <button onclick="falar()">🎤</button>
</div>

<!-- FIREBASE + VOZ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDznyCmJFb7bsQpwuTxxJvvAsb3C-_c2Gc",
  authDomain: "harmonia--darkeana.firebaseapp.com",
  projectId: "harmonia--darkeana"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.send = async function () {
  const input = document.getElementById('input');
  const msg = input.value;
  if (!msg) return;

  document.getElementById('messages').innerHTML += "<div>> "+msg+"</div>";

  input.value = "";

  await addDoc(collection(db,"interactions"),{
    mensagem:msg,
    data:new Date()
  });

  const resposta = "Recebido";

  document.getElementById('messages').innerHTML += "<div>🤖 "+resposta+"</div>";

  const speech = new SpeechSynthesisUtterance(resposta);
  speech.lang="pt-BR";
  speechSynthesis.speak(speech);
}

window.falar = function(){
  const rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="pt-BR";
  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
  }
  rec.start();
}
</script>
