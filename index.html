<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E.R.H.D</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: url('https://eliarh.com.br/harminia.jpg') center center / cover no-repeat fixed;
    }

    header {
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.2rem;
      flex-shrink: 0;
    }

    .logo {
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .status {
      color: #ff2222;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    main { flex: 1; }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: #000000;
      text-align: center;
      padding: 0.65rem 1rem;
      color: #00cc44;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── TRANSLATOR PANEL ── */
    #translator {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: #000000;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 5px;
      gap: 0;
      z-index: 9999;
    }

    .tr-title {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: #444444;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: Arial, sans-serif;
    }

    .flag-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .flag-item:last-child { margin-bottom: 0; }

    .flag-btn {
      background: transparent;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .flag-btn img {
      display: block;
      border-radius: 2px;
    }

    .flag-btn:hover {
      border-color: #444;
      background: #111;
    }

    .flag-btn.active {
      border-color: #d4af37;
      background: #1c1600;
    }

    .flag-code {
      color: #ffffff;
      font-size: 9px;
      letter-spacing: 1px;
      font-family: Arial, sans-serif;
      text-align: center;
      line-height: 1;
    }

    .flag-item.active .flag-code {
      color: #d4af37;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">E.R.H.D</span>
    <span class="status" id="hdr-status">SITE EM CONSTRUÇÃO</span>
  </header>

  <main></main>

  <footer id="ftr-text">Entidade Religiosa Harmonia Darkena</footer>

  <!-- TRANSLATOR PANEL -->
  <div id="translator">
    <span class="tr-title">Translator</span>

    <div class="flag-item active" id="item-pt" onclick="setLang('pt')">
      <button class="flag-btn active" id="flag-pt"><img src="https://flagcdn.com/32x24/br.png" width="36" height="27" alt="PT"></button>
      <span class="flag-code">PT</span>
    </div>

    <div class="flag-item" id="item-en" onclick="setLang('en')">
      <button class="flag-btn" id="flag-en"><img src="https://flagcdn.com/32x24/gb.png" width="36" height="27" alt="EN"></button>
      <span class="flag-code">EN</span>
    </div>

    <div class="flag-item" id="item-it" onclick="setLang('it')">
      <button class="flag-btn" id="flag-it"><img src="https://flagcdn.com/32x24/it.png" width="36" height="27" alt="IT"></button>
      <span class="flag-code">IT</span>
    </div>

    <div class="flag-item" id="item-es" onclick="setLang('es')">
      <button class="flag-btn" id="flag-es"><img src="https://flagcdn.com/32x24/es.png" width="36" height="27" alt="ES"></button>
      <span class="flag-code">ES</span>
    </div>

    <div class="flag-item" id="item-fr" onclick="setLang('fr')">
      <button class="flag-btn" id="flag-fr"><img src="https://flagcdn.com/32x24/fr.png" width="36" height="27" alt="FR"></button>
      <span class="flag-code">FR</span>
    </div>

    <div class="flag-item" id="item-ja" onclick="setLang('ja')">
      <button class="flag-btn" id="flag-ja"><img src="https://flagcdn.com/32x24/jp.png" width="36" height="27" alt="JA"></button>
      <span class="flag-code">JA</span>
    </div>

    <div class="flag-item" id="item-zh" onclick="setLang('zh')">
      <button class="flag-btn" id="flag-zh"><img src="https://flagcdn.com/32x24/cn.png" width="36" height="27" alt="ZH"></button>
      <span class="flag-code">ZH</span>
    </div>
  </div>

  <script>
    const t = {
      pt: {
        status: 'SITE EM CONSTRUÇÃO',
        footer: 'Entidade Religiosa Harmonia Darkena'
      },
      en: {
        status: 'SITE UNDER CONSTRUCTION',
        footer: 'Religious Entity Harmonia Darkena'
      },
      it: {
        status: 'SITO IN COSTRUZIONE',
        footer: 'Entità Religiosa Harmonia Darkena'
      },
      es: {
        status: 'SITIO EN CONSTRUCCIÓN',
        footer: 'Entidad Religiosa Harmonia Darkena'
      },
      fr: {
        status: 'SITE EN CONSTRUCTION',
        footer: 'Entité Religieuse Harmonia Darkena'
      },
      ja: {
        status: 'サイト工事中',
        footer: '宗教法人 ハーモニア・ダルケナ'
      },
      zh: {
        status: '网站建设中',
        footer: '宗教实体 和谐达尔卡纳'
      }
    };

    const langs = ['pt','en','it','es','fr','ja','zh'];

    function setLang(lang) {
      langs.forEach(l => {
        document.getElementById('flag-' + l).classList.remove('active');
        document.getElementById('item-' + l).classList.remove('active');
      });
      document.getElementById('flag-' + lang).classList.add('active');
      document.getElementById('item-' + lang).classList.add('active');
      document.getElementById('hdr-status').textContent = t[lang].status;
      document.getElementById('ftr-text').textContent = t[lang].footer;
    }
  </script>
  <div id="chat-box" style="position:fixed; bottom:60px; right:20px; width:300px; background:#000; color:#0f0; padding:10px; border:1px solid #333;">
  <div id="messages" style="height:150px; overflow:auto;"></div>
  <input id="input" type="text" placeholder="Digite..." style="width:100%;">
  <button onclick="send()">Enviar</button>
</div>

<script>
function send() {
  const input = document.getElementById('input');
  const msg = input.value;

  if (!msg) return;

  const messages = document.getElementById('messages');
  messages.innerHTML += "<div>> " + msg + "</div>";

  input.value = "";
}
</script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDznyCmJFb7bsQpwuTxxJvvAsb3C-_c2Gc",
    authDomain: "harmonia--darkeana.firebaseapp.com",
    projectId: "harmonia--darkeana"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
</script>
</body>
</html>
